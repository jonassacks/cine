<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0b0b0c;
      --fg:    #f2f2f0;
      --muted: rgba(255,255,255,0.45);
      --line:  rgba(255,255,255,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: clamp(1.5rem, 4vw, 2.5rem);
      padding: clamp(1.75rem, 5vw, 4rem) clamp(1.25rem, 5vw, 2rem);
    }

    /* ── Header (EDIT THE TEXT BELOW) ─────────────── */
    .site-header { text-align: center; }

    .site-header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .tagline {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Player frame ─────────────────────────────── */
    .player {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;     /* change to 9/16 for vertical, 4/3, etc. */
      background: #000;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .vid-layer {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;        /* 'contain' = no crop but black bars */
      opacity: 0;
    }

    .vid-layer.active { opacity: 1; }

    /* ── Start overlay ────────────────────────────── */
    #start-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    #start-overlay.hidden { opacity: 0; pointer-events: none; }

    .start-icon {
      width: 56px; height: 56px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6);
      transition: border-color 0.2s, color 0.2s;
    }

    #start-overlay:hover .start-icon {
      border-color: rgba(255,255,255,0.7);
      color: #fff;
    }

    .start-icon svg { width: 22px; height: 22px; margin-left: 3px; }

    .start-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ── Clip name overlay ────────────────────────── */
    #clip-name {
      position: absolute;
      bottom: 1rem; left: 1.1rem;
      z-index: 10;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      max-width: calc(100% - 110px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    #clip-name.visible { opacity: 1; transform: translateY(0); }

    /* ── Controls ─────────────────────────────────── */
    .controls {
      position: absolute;
      bottom: 0.9rem; right: 1rem;
      z-index: 10;
      display: flex;
      gap: 0.55rem;
    }

    .ctrl-btn {
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .ctrl-btn:hover {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
      background: rgba(0,0,0,0.55);
    }

    .ctrl-btn svg { width: 14px; height: 14px; }

    /* ── Empty state ──────────────────────────────── */
    #empty-state {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      text-align: center;
      padding: 1.5rem;
    }

    #empty-state.visible { display: flex; }

    #empty-state p {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      line-height: 2;
    }

    #empty-state code {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      background: rgba(255,255,255,0.07);
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-size: 0.72rem;
      letter-spacing: 0;
      text-transform: none;
    }

    /* ── Description + footer (EDIT THE TEXT) ──────── */
    .description {
      max-width: 60ch;
      margin: 0 auto;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .site-footer {
      margin-top: auto;
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      padding: 1.5rem 1.25rem;
      border-top: 1px solid var(--line);
    }

    .site-footer a { color: var(--fg); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <main class="page">

    <!-- ╔═══ EDIT: heading + tagline ═══╗ -->
    <header class="site-header">
      <h1>Cine</h1>
      <p class="tagline">A looping film portfolio</p>
    </header>
    <!-- ╚═══════════════════════════════╝ -->

    <div class="player-wrap">
      <div class="player">
        <!-- Two video layers — one plays while the other preloads the next.
             muted = clips are silent; the soundtrack is the only audio. -->
        <video id="vid0" class="vid-layer active" playsinline preload="auto" muted></video>
        <video id="vid1" class="vid-layer"        playsinline preload="auto" muted></video>

        <!-- Start overlay -->
        <div id="start-overlay">
          <div class="start-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <span class="start-label" id="start-label">Click to play</span>
        </div>

        <!-- Empty state -->
        <div id="empty-state">
          <p>No clips found.<br>Check <code>clips.json</code> or your bucket.</p>
        </div>

        <!-- Clip name -->
        <div id="clip-name"></div>

        <!-- Controls -->
        <div class="controls">
          <button class="ctrl-btn" id="btn-skip" title="Next clip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-mute" title="Toggle audio">
            <svg id="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <svg id="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ╔═══ EDIT: description ═══╗ -->
    <p class="description">
      A continuous, shuffled loop of short film fragments. Replace this line in
      <code>index.html</code> with a sentence about the work.
    </p>
    <!-- ╚═════════════════════════╝ -->

    <footer class="site-footer">
      <span>© 2026 — built with <a href="https://github.com/jonassacks/cine">cine</a></span>
    </footer>

  </main>

  <audio id="audio" loop preload="auto"></audio>

  <script>
    const vids       = [document.getElementById('vid0'), document.getElementById('vid1')];
    const audio      = document.getElementById('audio');
    const overlay    = document.getElementById('start-overlay');
    const emptyState = document.getElementById('empty-state');
    const clipNameEl = document.getElementById('clip-name');
    const startLabel = document.getElementById('start-label');
    const btnSkip    = document.getElementById('btn-skip');
    const btnMute    = document.getElementById('btn-mute');
    const iconOn     = document.getElementById('icon-on');
    const iconOff    = document.getElementById('icon-off');

    /* ── Config ──────────────────────────────────────
       MANIFEST_URL: where the media list comes from. Accepts either:
         • a JSON array of clip strings            → e.g. local clips.json
         • { "clips": [...], "audio": [...] }      → the R2-listing Worker
       With the object form, the soundtrack is auto-detected too, so you
       can replace the audio in R2 under any filename.

       AUDIO_SRC: fallback soundtrack used only when the manifest doesn't
       provide one (e.g. the plain-array local clips.json).               */
    const MANIFEST_URL = 'https://cineclips.jonas-374.workers.dev/';
    const AUDIO_SRC    = 'https://pub-4d2cbc4d9d64403d8814842155ac7f95.r2.dev/05_Passacaglia_320kbps-2ch.mp3';

    let audioSrc = AUDIO_SRC;  // overridden by the manifest if it lists audio

    let clips     = [];
    let index     = 0;
    let active    = 0;   // which video element is currently showing
    let nameTimer = null;
    let started   = false;
    let failCount = 0;   // consecutive unplayable clips (prevents infinite skip)

    /* ── Helpers ───────────────────────────────── */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Bare filename → served from clips/ ; full URL → used as-is.
    function resolveSrc(entry) {
      return /^https?:\/\//i.test(entry) ? entry : 'clips/' + entry;
    }

    function cleanName(entry) {
      return entry
        .replace(/[?#].*$/, '')            // strip URL query/hash
        .replace(/^.*\//, '')              // strip any path → filename
        .replace(/%20/g, ' ')              // decode common space encoding
        .replace(/\.[^.]+$/, '')           // strip extension
        .replace(/^\d+\s*[._\-]?\s*/, '')  // strip leading number prefix
        .replace(/[-_]/g, ' ')             // separators → spaces
        .trim();
    }

    function showName(name) {
      clearTimeout(nameTimer);
      clipNameEl.textContent = name;
      clipNameEl.classList.add('visible');
      nameTimer = setTimeout(() => clipNameEl.classList.remove('visible'), 3500);
    }

    function swapTo(nextActive) {
      vids[nextActive].classList.add('active');
      vids[1 - nextActive].classList.remove('active');
      active = nextActive;
    }

    function preloadNext() {
      if (clips.length < 2) return;
      const nextI    = (index + 1) % clips.length;
      const inactive = vids[1 - active];
      inactive.src = resolveSrc(clips[nextI]);
      inactive.load();
    }

    function nextIndex() {
      const next = index + 1;
      if (next >= clips.length) clips = shuffle(clips); // re-shuffle on loop
      return next;
    }

    function skipBroken() {
      failCount++;
      if (failCount >= clips.length) {     // every clip failed — stop trying
        showName('No playable clips');
        return;
      }
      playAt(nextIndex());
    }

    /* ── Play clip at index i ──────────────────── */
    function playAt(i) {
      if (clips.length === 0) return;
      index = ((i % clips.length) + clips.length) % clips.length;

      const nextActive = 1 - active;
      const vid = vids[nextActive];

      const wanted = resolveSrc(clips[index]);
      if (!vid.src || !vid.src.endsWith(wanted.replace(/^.*\//, '/'))) {
        vid.src = wanted;
        vid.load();
      }

      vid.play()
        .then(() => {
          failCount = 0;
          swapTo(nextActive);
          showName(cleanName(clips[index]));
          preloadNext();
        })
        .catch(() => skipBroken()); // codec unsupported / load failed → skip
    }

    vids.forEach(vid => {
      vid.addEventListener('ended', () => {
        if (!vid.classList.contains('active')) return;
        failCount = 0;
        playAt(nextIndex());
      });
      vid.addEventListener('error', () => {
        if (!vid.classList.contains('active')) return;
        skipBroken();
      });
    });

    /* ── Start ─────────────────────────────────── */
    function start() {
      if (started) return;
      started = true;
      overlay.classList.add('hidden');

      if (clips.length === 0) {
        emptyState.classList.add('visible');
        return;
      }

      playAt(0);
      audio.src = audioSrc;
      audio.play().catch(() => {});
    }

    overlay.addEventListener('click', start);

    btnSkip.addEventListener('click', () => {
      if (!started || clips.length === 0) return;
      vids[active].pause();
      failCount = 0;
      playAt(nextIndex());
    });

    btnMute.addEventListener('click', () => {
      audio.muted = !audio.muted;
      iconOn.style.display  = audio.muted ? 'none' : '';
      iconOff.style.display = audio.muted ? '' : 'none';
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space')                 { e.preventDefault(); start(); }
      if (e.code === 'ArrowRight' && started) btnSkip.click();
      if (e.code === 'KeyM')                  btnMute.click();
    });

    /* ── Load manifest ─────────────────────────── */
    fetch(MANIFEST_URL, { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        // Accept a plain array (local clips.json) or { clips, audio } (Worker)
        const list  = Array.isArray(data) ? data : (data && data.clips) || [];
        const audioList = (data && !Array.isArray(data) && data.audio) || [];

        clips = shuffle(list.filter(f => typeof f === 'string' && f.length > 0));
        if (audioList.length) audioSrc = audioList[0]; // first audio file = soundtrack
        if (clips.length === 0) startLabel.textContent = 'No clips found';
      })
      .catch(() => { startLabel.textContent = 'Could not load clips'; });
  </script>

</body>
</html>
